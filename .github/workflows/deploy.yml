name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Next.js → Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (workspace root)
        run: npm install --legacy-peer-deps

      - name: Build Next.js
        working-directory: apps/web
        run: npx next build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SUPABASE_URL: https://lmrrawhvjmuexajllint.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_3_Vzle5e2GXFtLG5d8F69Q_oznMxXm2
          NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY: 0x4AAAAAACj5TNMi2k0b77UT
          NEXT_PUBLIC_WORKER_URL: https://travel-capsule-worker.netson94.workers.dev
          NEXT_PUBLIC_SITE_URL: https://travelscapsule.com

      - name: Build Cloudflare Pages bundle (@cloudflare/next-on-pages)
        working-directory: apps/web
        run: npx @cloudflare/next-on-pages@1

      # ── Set nodejs_compat flag BEFORE deploy ──────────────────────────────────
      # @cloudflare/next-on-pages generates a _worker.js that uses node:buffer
      # and node:async_hooks. Without nodejs_compat the Worker silently fails
      # and serves a blank page. We patch the Pages project via API every deploy
      # to guarantee the flag is always present.
      - name: Set nodejs_compat flag + NEXT_PUBLIC env vars via Cloudflare API
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/travel-cloth-recommend" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "deployment_configs": {
                "production": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-09-23",
                  "env_vars": {
                    "NEXT_PUBLIC_SUPABASE_URL":                  {"value": "https://lmrrawhvjmuexajllint.supabase.co"},
                    "NEXT_PUBLIC_SUPABASE_ANON_KEY":             {"value": "sb_publishable_3_Vzle5e2GXFtLG5d8F69Q_oznMxXm2"},
                    "NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY": {"value": "0x4AAAAAACj5TNMi2k0b77UT"},
                    "NEXT_PUBLIC_WORKER_URL":                    {"value": "https://travel-capsule-worker.netson94.workers.dev"},
                    "NEXT_PUBLIC_SITE_URL":                      {"value": "https://travelscapsule.com"}
                  }
                },
                "preview": {
                  "compatibility_flags": ["nodejs_compat"],
                  "compatibility_date": "2024-09-23",
                  "env_vars": {
                    "NEXT_PUBLIC_SUPABASE_URL":                  {"value": "https://lmrrawhvjmuexajllint.supabase.co"},
                    "NEXT_PUBLIC_SUPABASE_ANON_KEY":             {"value": "sb_publishable_3_Vzle5e2GXFtLG5d8F69Q_oznMxXm2"},
                    "NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY": {"value": "0x4AAAAAACj5TNMi2k0b77UT"},
                    "NEXT_PUBLIC_WORKER_URL":                    {"value": "https://travel-capsule-worker.netson94.workers.dev"},
                    "NEXT_PUBLIC_SITE_URL":                      {"value": "https://travelscapsule.com"}
                  }
                }
              }
            }')

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")

          echo "API response status: $HTTP_STATUS"
          echo "$BODY" | jq '{success: .success, errors: .errors}' 2>/dev/null || echo "$BODY"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "⚠️  WARNING: Could not set nodejs_compat flag automatically."
            echo "    Please set it manually in Cloudflare Pages dashboard:"
            echo "    Pages → travel-cloth-recommend → Settings → Functions → Compatibility flags"
            echo "    Add: nodejs_compat  (to both Production and Preview)"
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/.vercel/output/static --project-name=travel-cloth-recommend --commit-dirty=true

  deploy-worker:
    name: Deploy Cloudflare Worker + Secrets
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (workspace root)
        run: npm install --legacy-peer-deps

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: deploy

      # ── Set Worker secrets from GitHub repository secrets ──────────────────────
      # These secrets must be added to GitHub → Settings → Secrets → Actions once.
      # wrangler secret put is idempotent — safe to run on every deploy.
      - name: Set Worker secrets
        working-directory: apps/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set_secret() {
            local NAME="$1"
            local VALUE="$2"
            if [ -n "$VALUE" ]; then
              echo "$VALUE" | npx wrangler secret put "$NAME"
              echo "✅ Secret set: $NAME"
            else
              echo "⚠️  Skipping $NAME (not configured in GitHub Secrets)"
            fi
          }
          set_secret ANTHROPIC_API_KEY              "${{ secrets.ANTHROPIC_API_KEY }}"
          set_secret NANOBANANA_API_KEY             "${{ secrets.NANOBANANA_API_KEY }}"
          set_secret POLAR_ACCESS_TOKEN             "${{ secrets.POLAR_ACCESS_TOKEN }}"
          set_secret POLAR_WEBHOOK_SECRET           "${{ secrets.POLAR_WEBHOOK_SECRET }}"
          set_secret SUPABASE_SERVICE_ROLE_KEY      "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          set_secret R2_ACCESS_KEY_ID               "${{ secrets.R2_ACCESS_KEY_ID }}"
          set_secret R2_SECRET_ACCESS_KEY           "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          set_secret RESEND_API_KEY                 "${{ secrets.RESEND_API_KEY }}"
          set_secret GOOGLE_PLACES_API_KEY          "${{ secrets.GOOGLE_PLACES_API_KEY }}"
          set_secret CLOUDFLARE_TURNSTILE_SECRET_KEY "${{ secrets.CLOUDFLARE_TURNSTILE_SECRET_KEY }}"
