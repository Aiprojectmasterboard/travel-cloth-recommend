<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1410"/>
      <stop offset="100%" stop-color="#2D2318"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C4613A"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent line -->
  <rect x="80" y="280" width="80" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- Title -->
  <text x="80" y="250" fill="white" font-family="Georgia, 'Playfair Display', serif" font-size="64" font-style="italic" font-weight="700">Travel Capsule AI</text>

  <!-- Subtitle -->
  <text x="80" y="340" fill="rgba(255,255,255,0.8)" font-family="system-ui, 'Plus Jakarta Sans', sans-serif" font-size="28" font-weight="400">Your AI Travel Stylist</text>

  <!-- Description -->
  <text x="80" y="395" fill="rgba(255,255,255,0.5)" font-family="system-ui, sans-serif" font-size="20">Weather analysis · City vibe matching · AI outfit generation</text>
  <text x="80" y="430" fill="rgba(255,255,255,0.5)" font-family="system-ui, sans-serif" font-size="20">Capsule wardrobe · 100+ cities · Pack less, look better</text>

  <!-- CTA badge -->
  <rect x="80" y="470" width="220" height="44" rx="4" fill="#C4613A"/>
  <text x="190" y="498" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle" letter-spacing="2">START PLANNING</text>

  <!-- Domain -->
  <text x="80" y="580" fill="rgba(255,255,255,0.3)" font-family="monospace" font-size="14" letter-spacing="2">TRAVELSCAPSULE.COM</text>

  <!-- Decorative luggage icon -->
  <g transform="translate(900, 140)" fill="none" stroke="#C4613A" stroke-width="2" opacity="0.6">
    <rect x="20" y="0" width="160" height="220" rx="12"/>
    <rect x="60" y="-20" width="80" height="20" rx="6"/>
    <line x1="20" y1="70" x2="180" y2="70"/>
    <line x1="20" y1="150" x2="180" y2="150"/>
    <circle cx="60" cy="240" r="14"/>
    <circle cx="140" cy="240" r="14"/>
  </g>

  <!-- Border accent -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
